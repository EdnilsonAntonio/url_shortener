services:
  traefik:
    image: traefik:latest
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      # Removido o endpoint manual para deixar o Traefik auto-detetar
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      # Usar o caminho padrão, mas sem o 'ro' para testar a permissão de escrita/leitura
      - "/var/run/docker.sock:/var/run/docker.sock"

  api:
    build: .
    # Esta diretiva lê o ficheiro .env e passa as variáveis para o contentor
    env_file:
      - .env 
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api-router.rule=Host(`short.local`) || Host(`44.222.165.255`)"
      - "traefik.http.services.api.loadbalancer.server.port=8000"
      # Configuração de CORS para permitir requisições do frontend
      - "traefik.http.middlewares.cors-api.headers.accesscontrolallowmethods=GET,POST,DELETE,OPTIONS"
      - "traefik.http.middlewares.cors-api.headers.accesscontrolalloworiginlist=http://localhost:5173"
      - "traefik.http.middlewares.cors-api.headers.accesscontrolallowheaders=Content-Type,Authorization"
      - "traefik.http.routers.api-router.middlewares=cors-api"
    # Remova a secção 'environment' anterior se estiver a usar o 'env_file'